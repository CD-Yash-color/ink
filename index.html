<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インクバトル3D</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  #info {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
  }
</style>
</head>
<body>
<div id="info">WASD移動 / マウスで視点 / クリックで塗る</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== 基本セット =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== ライト =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// ===== プレイヤー =====
camera.position.set(0, 2, 5);

// ===== 地面（グリッド） =====
const gridSize = 20;
const tiles = [];
const tileSize = 1;

for(let x=0;x<gridSize;x++){
  tiles[x] = [];
  for(let z=0;z<gridSize;z++){
    const geo = new THREE.PlaneGeometry(tileSize, tileSize);
    const mat = new THREE.MeshLambertMaterial({color: 0x555555});
    const tile = new THREE.Mesh(geo, mat);

    tile.rotation.x = -Math.PI/2;
    tile.position.set(x - gridSize/2, 0, z - gridSize/2);

    scene.add(tile);
    tiles[x][z] = tile;
  }
}

// ===== 操作 =====
const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// マウス視点
let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", e => {
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
});

// ===== インク発射 =====
document.addEventListener("click", () => {
  const dir = new THREE.Vector3(
    Math.sin(yaw),
    0,
    Math.cos(yaw)
  );

  const pos = camera.position.clone();

  for(let i=1;i<6;i++){
    const x = Math.floor(pos.x + dir.x * i + gridSize/2);
    const z = Math.floor(pos.z + dir.z * i + gridSize/2);

    if(tiles[x] && tiles[x][z]){
      tiles[x][z].material.color.set(0x00ffcc);
    }
  }
});

// ===== 更新 =====
function animate(){
  requestAnimationFrame(animate);

  // 移動
  const speed = 0.1;
  if(keys["w"]) camera.position.z -= Math.cos(yaw)*speed, camera.position.x -= Math.sin(yaw)*speed;
  if(keys["s"]) camera.position.z += Math.cos(yaw)*speed, camera.position.x += Math.sin(yaw)*speed;
  if(keys["a"]) camera.position.x -= Math.cos(yaw)*speed, camera.position.z += Math.sin(yaw)*speed;
  if(keys["d"]) camera.position.x += Math.cos(yaw)*speed, camera.position.z -= Math.sin(yaw)*speed;

  // カメラ向き
  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  renderer.render(scene, camera);
}

animate();

// リサイズ対応
window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
