<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インクバトル進化版</title>
<style>
body { margin:0; overflow:hidden; background:black;}

/* クロスヘア */
#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 10px;
  height: 10px;
  margin-left: -5px;
  margin-top: -5px;
  border: 2px solid white;
  border-radius: 50%;
}

#info {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}
</style>
</head>
<body>
<div id="info">クリックで開始 / WASD移動 / マウスでエイム / クリック発射 / SPACEジャンプ</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== 基本 =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== ライト =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// ===== プレイヤー =====
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshLambertMaterial({color:0x00ffcc})
);
player.position.y = 1;
scene.add(player);

// ===== 地面 =====
const gridSize = 20;
const tiles = [];

for(let x=0;x<gridSize;x++){
  tiles[x]=[];
  for(let z=0;z<gridSize;z++){
    const tile = new THREE.Mesh(
      new THREE.PlaneGeometry(1,1),
      new THREE.MeshLambertMaterial({color:0x555555})
    );
    tile.rotation.x = -Math.PI/2;
    tile.position.set(x-gridSize/2,0,z-gridSize/2);
    scene.add(tile);
    tiles[x][z]=tile;
  }
}

// ===== 入力 =====
const keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// ===== マウスロック =====
let yaw = 0;
let pitch = 0;

document.body.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement){
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-0.5, Math.min(0.5, pitch));
  }
});

// ===== ジャンプ =====
let velocityY = 0;
let onGround = true;

// ===== 弾 =====
const bullets = [];

// ===== 発射 =====
document.addEventListener("mousedown", ()=>{
  if(!document.pointerLockElement) return;

  const bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshBasicMaterial({color:0x00ffcc})
  );

  // プレイヤーの少し前から発射
  const forward = new THREE.Vector3(
    Math.sin(yaw),
    0,
    Math.cos(yaw)
  );

  bullet.position.copy(player.position).add(forward.clone().multiplyScalar(1));

  // エイム方向（上下も含む）
  const direction = new THREE.Vector3(
    Math.sin(yaw),
    Math.sin(pitch),
    Math.cos(yaw)
  ).normalize();

  bullet.velocity = direction.multiplyScalar(0.4);

  bullets.push(bullet);
  scene.add(bullet);
});

// ===== 更新 =====
function animate(){
  requestAnimationFrame(animate);

  const speed = 0.1;

  // ===== 移動 =====
  if(keys["w"]){
    player.position.x -= Math.sin(yaw)*speed;
    player.position.z -= Math.cos(yaw)*speed;
  }
  if(keys["s"]){
    player.position.x += Math.sin(yaw)*speed;
    player.position.z += Math.cos(yaw)*speed;
  }
  if(keys["a"]){
    player.position.x -= Math.cos(yaw)*speed;
    player.position.z += Math.sin(yaw)*speed;
  }
  if(keys["d"]){
    player.position.x += Math.cos(yaw)*speed;
    player.position.z -= Math.sin(yaw)*speed;
  }

  // ===== ジャンプ =====
  if(keys[" "] && onGround){
    velocityY = 0.2;
    onGround = false;
  }

  velocityY -= 0.01;
  player.position.y += velocityY;

  if(player.position.y <= 1){
    player.position.y = 1;
    velocityY = 0;
    onGround = true;
  }

  // ===== 弾更新（物理） =====
  bullets.forEach((b,i)=>{
    b.velocity.y -= 0.01; // 重力
    b.position.add(b.velocity);

    // 着弾
    if(b.position.y <= 0.2){
      const x = Math.floor(b.position.x + gridSize/2);
      const z = Math.floor(b.position.z + gridSize/2);

      if(tiles[x] && tiles[x][z]){
        tiles[x][z].material.color.set(0x00ffcc);
      }

      scene.remove(b);
      bullets.splice(i,1);
    }
  });

  // ===== 三人称カメラ =====
  const camOffset = new THREE.Vector3(
    Math.sin(yaw)*5,
    3 + pitch*5,
    Math.cos(yaw)*5
  );

  camera.position.copy(player.position).add(camOffset);
  camera.lookAt(player.position.clone().add(new THREE.Vector3(0,1,0)));

  renderer.render(scene, camera);
}

animate();

// ===== リサイズ =====
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
