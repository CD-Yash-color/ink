<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インクバトル完成版</title>
<style>
body { margin:0; overflow:hidden; background:black;}

#crosshair {
  position:absolute;
  top:50%; left:50%;
  width:12px; height:12px;
  margin:-6px;
  border:2px solid white;
  border-radius:50%;
}

#info {
  position:absolute;
  top:10px; left:10px;
  color:white;
}
</style>
</head>
<body>
<div id="info">クリックで開始 / WASD移動 / マウスでエイム / クリックで発射 / SPACEジャンプ</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== 基本 =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== ライト =====
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// ===== プレイヤー（人型） =====
const player = new THREE.Group();

// 体
const body = new THREE.Mesh(
  new THREE.BoxGeometry(1,1.5,0.5),
  new THREE.MeshLambertMaterial({color:0x00ffcc})
);
body.position.y = 1.5;

// 頭
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.4),
  new THREE.MeshLambertMaterial({color:0xffcc99})
);
head.position.y = 2.5;

// 足
const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3), body.material);
leg1.position.set(-0.2,0.5,0);
const leg2 = leg1.clone();
leg2.position.x = 0.2;

player.add(body, head, leg1, leg2);
scene.add(player);

// ===== 地面 =====
const gridSize = 20;
const tiles = [];

for(let x=0;x<gridSize;x++){
  tiles[x]=[];
  for(let z=0;z<gridSize;z++){
    const tile = new THREE.Mesh(
      new THREE.PlaneGeometry(1,1),
      new THREE.MeshLambertMaterial({color:0x555555})
    );
    tile.rotation.x = -Math.PI/2;
    tile.position.set(x-gridSize/2,0,z-gridSize/2);
    scene.add(tile);
    tiles[x][z]=tile;
  }
}

// ===== 入力 =====
const keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// ===== マウス =====
let yaw=0, pitch=0;

document.body.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement){
    yaw -= e.movementX*0.002;
    pitch -= e.movementY*0.002;
    pitch = Math.max(-0.6, Math.min(0.6, pitch));
  }
});

// ===== ジャンプ =====
let vy=0, onGround=true;

// ===== 弾 =====
const bullets=[];

// ===== Raycast用 =====
const raycaster = new THREE.Raycaster();

// ===== 発射 =====
document.addEventListener("mousedown", ()=>{
  if(!document.pointerLockElement) return;

  // クロスヘア中心からレイ
  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);

  const direction = raycaster.ray.direction.clone();

  // プレイヤー前方から発射
  const spawn = player.position.clone();
  spawn.y += 1.5;

  const bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshBasicMaterial({color:0x00ffcc})
  );

  bullet.position.copy(spawn);

  bullet.velocity = direction.multiplyScalar(0.4);

  bullets.push(bullet);
  scene.add(bullet);
});

// ===== 更新 =====
function animate(){
  requestAnimationFrame(animate);

  const speed = 0.1;

  // ===== 移動 =====
  if(keys["w"]){
    player.position.x -= Math.sin(yaw)*speed;
    player.position.z -= Math.cos(yaw)*speed;
  }
  if(keys["s"]){
    player.position.x += Math.sin(yaw)*speed;
    player.position.z += Math.cos(yaw)*speed;
  }
  if(keys["a"]){
    player.position.x -= Math.cos(yaw)*speed;
    player.position.z += Math.sin(yaw)*speed;
  }
  if(keys["d"]){
    player.position.x += Math.cos(yaw)*speed;
    player.position.z -= Math.sin(yaw)*speed;
  }

  // 向き
  player.rotation.y = yaw;

  // ===== ジャンプ =====
  if(keys[" "] && onGround){
    vy=0.2;
    onGround=false;
  }

  vy -= 0.01;
  player.position.y += vy;

  if(player.position.y <= 0){
    player.position.y = 0;
    vy=0;
    onGround=true;
  }

  // ===== 弾 =====
  bullets.forEach((b,i)=>{
    b.velocity.y -= 0.01;
    b.position.add(b.velocity);

    if(b.position.y <= 0.1){
      const x = Math.floor(b.position.x + gridSize/2);
      const z = Math.floor(b.position.z + gridSize/2);

      if(tiles[x] && tiles[x][z]){
        tiles[x][z].material.color.set(0x00ffcc);
      }

      scene.remove(b);
      bullets.splice(i,1);
    }
  });

  // ===== カメラ（三人称） =====
  const offset = new THREE.Vector3(
    Math.sin(yaw)*5,
    3 + pitch*4,
    Math.cos(yaw)*5
  );

  camera.position.copy(player.position).add(offset);
  camera.lookAt(player.position.clone().add(new THREE.Vector3(0,1.5,0)));

  renderer.render(scene, camera);
}

animate();

// ===== リサイズ =====
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
