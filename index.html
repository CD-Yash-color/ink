<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インクバトル最強版</title>
<style>
body { margin:0; overflow:hidden; background:black;}

#crosshair {
  position:absolute;
  top:50%; left:50%;
  width:12px; height:12px;
  margin:-6px;
  border:2px solid white;
  border-radius:50%;
}
</style>
</head>
<body>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== 基本 =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== ライト =====
scene.add(new THREE.DirectionalLight(0xffffff,1));

// ===== プレイヤー =====
const player = new THREE.Group();
player.scale.set(0.7,0.7,0.7);
scene.add(player);

// ===== 人型 =====
const body = new THREE.Mesh(
  new THREE.BoxGeometry(1,1.5,0.5),
  new THREE.MeshLambertMaterial({color:0x00ffcc})
);
body.position.y = 1.5;

const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.4),
  new THREE.MeshLambertMaterial({color:0xffcc99})
);
head.position.y = 2.5;

const arm = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,1,0.3),
  body.material
);
arm.position.set(0.8,1.5,0);

// ===== 武器 =====
const gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.8,0.3,0.3),
  new THREE.MeshLambertMaterial({color:0x222222})
);
gun.position.set(1.2,1.5,0);

player.add(body, head, arm, gun);

// ===== イカ状態 =====
const squid = new THREE.Mesh(
  new THREE.ConeGeometry(0.6,1.2,8),
  new THREE.MeshLambertMaterial({color:0x00ffcc})
);
squid.rotation.x = Math.PI;
squid.position.y = 0.5;
scene.add(squid);
squid.visible = false;

// ===== 地面 =====
const gridSize = 20;
const tiles = [];

for(let x=0;x<gridSize;x++){
  tiles[x]=[];
  for(let z=0;z<gridSize;z++){
    const tile = new THREE.Mesh(
      new THREE.PlaneGeometry(1,1),
      new THREE.MeshLambertMaterial({color:0x555555})
    );
    tile.rotation.x = -Math.PI/2;
    tile.position.set(x-gridSize/2,0,z-gridSize/2);
    scene.add(tile);
    tiles[x][z]=tile;
  }
}

// ===== 入力 =====
const keys = {};
let shooting=false;
let squidMode=false;

document.addEventListener("keydown", e=>{
  keys[e.key]=true;
  if(e.key==="Shift") squidMode=true;
});
document.addEventListener("keyup", e=>{
  keys[e.key]=false;
  if(e.key==="Shift") squidMode=false;
});

document.addEventListener("mousedown", ()=> shooting=true);
document.addEventListener("mouseup", ()=> shooting=false);

// ===== マウス =====
let yaw=0,pitch=0;

document.body.onclick=()=>document.body.requestPointerLock();

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement){
    yaw -= e.movementX*0.002;
    pitch -= e.movementY*0.002;
    pitch = Math.max(-0.6, Math.min(0.6, pitch));
  }
});

// ===== ジャンプ =====
let vy=0,onGround=true;

// ===== 弾 =====
const bullets=[];
const raycaster=new THREE.Raycaster();
let cooldown=0;

// ===== 更新 =====
function animate(){
requestAnimationFrame(animate);

// ===== 自分のインク判定 =====
const tx = Math.floor(player.position.x + gridSize/2);
const tz = Math.floor(player.position.z + gridSize/2);

let onInk=false;
if(tiles[tx] && tiles[tx][tz]){
  const c = tiles[tx][tz].material.color.getHex();
  if(c === 0x00ffcc) onInk=true;
}

// ===== モード切替 =====
if(squidMode && onInk){
  player.visible=false;
  squid.visible=true;
  squid.position.copy(player.position);
}else{
  player.visible=true;
  squid.visible=false;
}

// ===== 移動速度 =====
let speed = (squidMode && onInk) ? 0.2 : 0.1;

// ===== 移動 =====
if(keys["w"]){
  player.position.x -= Math.sin(yaw)*speed;
  player.position.z -= Math.cos(yaw)*speed;
}
if(keys["s"]){
  player.position.x += Math.sin(yaw)*speed;
  player.position.z += Math.cos(yaw)*speed;
}
if(keys["a"]){
  player.position.x -= Math.cos(yaw)*speed;
  player.position.z += Math.sin(yaw)*speed;
}
if(keys["d"]){
  player.position.x += Math.cos(yaw)*speed;
  player.position.z -= Math.sin(yaw)*speed;
}

player.rotation.y = yaw;
squid.rotation.y = yaw;

// ===== ジャンプ（人のみ） =====
if(!squidMode){
  if(keys[" "] && onGround){
    vy=0.2;
    onGround=false;
  }
  vy -= 0.01;
  player.position.y += vy;

  if(player.position.y <= 0){
    player.position.y=0;
    vy=0;
    onGround=true;
  }
}

// ===== 発射 =====
cooldown--;

if(shooting && cooldown<=0 && !squidMode){
  cooldown=8;

  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  const dir = raycaster.ray.direction.clone();

  const bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.15),
    new THREE.MeshBasicMaterial({color:0x00ffcc})
  );

  const spawn = player.position.clone();
  spawn.y += 1.5;
  bullet.position.copy(spawn);

  bullet.velocity = dir.multiplyScalar(0.4);

  bullets.push(bullet);
  scene.add(bullet);

  arm.rotation.x = -1.2;
}else{
  arm.rotation.x *= 0.8;
}

// ===== 弾更新 =====
bullets.forEach((b,i)=>{
  b.velocity.y -= 0.01;
  b.position.add(b.velocity);

  if(b.position.y <= 0.1){
    const x = Math.floor(b.position.x + gridSize/2);
    const z = Math.floor(b.position.z + gridSize/2);

    if(tiles[x] && tiles[x][z]){
      tiles[x][z].material.color.set(0x00ffcc);
    }

    scene.remove(b);
    bullets.splice(i,1);
  }
});

// ===== カメラ =====
const offset = new THREE.Vector3(
  Math.sin(yaw)*5,
  3 + pitch*4,
  Math.cos(yaw)*5
);

camera.position.copy(player.position).add(offset);
camera.lookAt(player.position.clone().add(new THREE.Vector3(0,1.5,0)));

renderer.render(scene,camera);
}

animate();

// ===== リサイズ =====
window.onresize=()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
};
</script>
</body>
</html>
